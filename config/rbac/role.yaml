---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - internal.functions.dev
  resources:
  - mcgobctriggers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - internal.functions.dev
  resources:
  - mcgobctriggers/finalizers
  verbs:
  - update
- apiGroups:
  - internal.functions.dev
  resources:
  - mcgobctriggers/status
  verbs:
  - get
  - patch
  - update
