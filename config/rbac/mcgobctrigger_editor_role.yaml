# This rule is not used by the project mcg-adapter itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the internal.functions.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mcg-adapter
    app.kubernetes.io/managed-by: kustomize
  name: mcgobctrigger-editor-role
rules:
- apiGroups:
  - internal.functions.dev
  resources:
  - mcgobctriggers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - internal.functions.dev
  resources:
  - mcgobctriggers/status
  verbs:
  - get
